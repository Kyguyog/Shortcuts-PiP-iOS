name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive
        run: |
          xcodebuild archive \
            -project PiPTextDisplay.xcodeproj \
            -scheme PiPTextDisplay \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/PiPTextDisplay.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p /tmp/Payload
          cp -r "$RUNNER_TEMP/PiPTextDisplay.xcarchive/Products/Applications/PiPTextDisplay.app" /tmp/Payload/
          cd /tmp && zip -r "$RUNNER_TEMP/PiPTextDisplay.ipa" Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PiPTextDisplay.ipa
          path: ${{ runner.temp }}/PiPTextDisplay.ipa
          retention-days: 30
