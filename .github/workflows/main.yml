name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/${XCODE}/Contents/Developer"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project PiPTextDisplay.xcodeproj \
            -scheme PiPTextDisplay \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            SYMROOT="${GITHUB_WORKSPACE}/build" \
            OBJROOT="${GITHUB_WORKSPACE}/build/obj" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            build \
            2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          retention-days: 7

      - name: Locate .app
        id: locate
        run: |
          APP_PATH=$(find "${GITHUB_WORKSPACE}/build" -name "PiPTextDisplay.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: PiPTextDisplay.app not found"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r "${{ steps.locate.outputs.APP_PATH }}" Payload/PiPTextDisplay.app
          zip -r PiPTextDisplay-unsigned.ipa Payload/
          echo "IPA size: $(du -sh PiPTextDisplay-unsigned.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PiPTextDisplay-unsigned-${{ github.sha }}
          path: PiPTextDisplay-unsigned.ipa
          retention-days: 30
